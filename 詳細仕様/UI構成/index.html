<!DOCTYPE html>
<html lang="ja" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <title>BitsKeep — UI構成一覧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="theme.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body class="bg-[var(--color-bg)] text-[var(--color-text)]">
<div id="app" class="p-8">

  <!-- ヘッダ -->
  <header class="flex justify-between items-center mb-8 pb-4 border-b border-[var(--color-border)]">
    <div class="flex items-center gap-3">
      <i data-lucide="cpu" class="w-8 h-8 text-[var(--color-primary)]"></i>
      <div>
        <h1 class="text-3xl font-bold">BitsKeep</h1>
        <p class="text-sm opacity-50">UI構成タタキ — スクリーン一覧</p>
      </div>
    </div>
    <button id="themeToggle" @click="toggleTheme"
      class="px-3 py-2 rounded border border-[var(--color-border)] text-xl">🌙</button>
  </header>

  <!-- フィルタ -->
  <div class="flex gap-2 mb-6 flex-wrap">
    <button v-for="grp in groups" :key="grp"
      @click="activeGroup = grp"
      class="px-3 py-1.5 rounded-full text-sm font-semibold border transition-colors"
      :class="activeGroup === grp
        ? 'bg-[var(--color-primary)] text-white border-[var(--color-primary)]'
        : 'border-[var(--color-border)] hover:border-[var(--color-primary)]'">
      {{ grp }}
    </button>
  </div>

  <!-- スクリーンカードグリッド -->
  <div class="grid gap-4" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
    <a v-for="screen in filteredScreens" :key="screen.id"
      :href="screen.href"
      class="card card-even rounded-xl border border-[var(--color-border)] p-5 hover:border-[var(--color-primary)] transition-all hover:shadow-md group no-underline block">

      <div class="flex items-start justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center text-white flex-shrink-0"
            :style="{ backgroundColor: screen.color }">
            <i :data-lucide="screen.icon" class="w-5 h-5"></i>
          </div>
          <div>
            <div class="text-xs font-mono opacity-50">{{ screen.id }}</div>
            <div class="font-bold text-sm leading-tight">{{ screen.name }}</div>
          </div>
        </div>
        <!-- ステータスバッジ -->
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold flex-shrink-0"
          :class="{
            'bg-[var(--color-tag-ok)] text-white': screen.status === 'done',
            'bg-[var(--color-tag-warning)] text-white': screen.status === 'wip',
            'bg-[var(--color-card-odd)] opacity-60': screen.status === 'todo',
          }">
          {{ screen.status === 'done' ? '✓ 完成' : screen.status === 'wip' ? '制作中' : '未着手' }}
        </span>
      </div>

      <p class="text-xs opacity-60 leading-relaxed mb-3">{{ screen.desc }}</p>

      <div class="flex items-center justify-between">
        <span class="text-xs opacity-40 px-2 py-0.5 rounded border border-[var(--color-border)]">
          {{ screen.group }}
        </span>
        <span class="text-xs link-text flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          開く <i data-lucide="arrow-right" class="w-3 h-3"></i>
        </span>
      </div>
    </a>
  </div>

  <!-- 凡例 -->
  <div class="mt-8 pt-4 border-t border-[var(--color-border)] flex gap-4 text-xs opacity-50">
    <span class="flex items-center gap-1">
      <span class="w-3 h-3 rounded-full bg-[var(--color-tag-ok)]"></span> 完成
    </span>
    <span class="flex items-center gap-1">
      <span class="w-3 h-3 rounded-full bg-[var(--color-tag-warning)]"></span> 制作中
    </span>
    <span class="flex items-center gap-1">
      <span class="w-3 h-3 rounded-full border border-current"></span> 未着手
    </span>
  </div>

</div>

<script>
  const { createApp, ref, computed, onMounted } = Vue;

  createApp({
    setup() {
      const screens = [
        {
          id: 'SCR-001', name: '部品一覧', href: 'components_list.html',
          icon: 'list', color: '#2980b9', group: '部品管理', status: 'done',
          desc: 'サイドバーフィルタ＋カードリスト。在庫・EOL・警告バッジ、サムネイル表示。',
        },
        {
          id: 'SCR-002', name: '部品詳細', href: 'component_detail.html',
          icon: 'info', color: '#2980b9', group: '部品管理', status: 'done',
          desc: '3セクションアコーディオン。基本情報・仕入れ先価格表・カスタムスペック。',
        },
        {
          id: 'SCR-003', name: '部品登録/編集', href: 'component_create.html',
          icon: 'plus-circle', color: '#27ae60', group: '部品管理', status: 'done',
          desc: 'スペック {種別,値,単位} の動的追加。仕入れ先・価格ブレイク管理。',
        },
        {
          id: 'SCR-004', name: '部品比較', href: 'component_compare.html',
          icon: 'git-compare', color: '#8e44ad', group: '部品管理', status: 'done',
          desc: 'グリッドテーブル比較（最大4部品）。差分ハイライト、プロジェクト紐づけドロワー。',
        },
        {
          id: 'SCR-005', name: 'プロジェクト一覧', href: 'project_list.html',
          icon: 'folder', color: '#e67e22', group: 'プロジェクト', status: 'done',
          desc: '二ペインレイアウト。プロジェクトサイドバー＋部品テーブル。コスト積算・不足警告。',
        },
        {
          id: 'SCR-006', name: '商社管理', href: 'supplier_list.html',
          icon: 'truck', color: '#16a085', group: 'マスタ管理', status: 'done',
          desc: '商社CRUD。識別カラー、URL、納期、送料無料条件を管理。',
        },
        {
          id: 'SCR-007', name: '保管棚管理', href: 'location_list.html',
          icon: 'archive', color: '#d35400', group: 'マスタ管理', status: 'done',
          desc: '棚マップビジュアル（グループ別グリッド）＋テーブル二ペイン。格納部品表示。',
        },
        {
          id: 'SCR-008', name: 'ユーザー管理', href: 'user_list.html',
          icon: 'users', color: '#c0392b', group: '設定', status: 'done',
          desc: 'ロール管理（admin/editor/viewer）。招待メール送信、有効化/無効化。',
        },
        {
          id: 'SCR-009', name: 'マスタ管理', href: 'master_list.html',
          icon: 'settings', color: '#7f8c8d', group: 'マスタ管理', status: 'done',
          desc: 'タブ切り替え。分類・パッケージ・スペック種別（単位倍率管理を含む）。',
        },
        {
          id: 'SCR-010', name: '操作ログ', href: 'audit_log.html',
          icon: 'clock', color: '#2c3e50', group: '設定', status: 'done',
          desc: 'アクション別フィルタ。diff/在庫変動の展開表示。ページネーション。',
        },
        {
          id: 'SCR-011', name: '合成抵抗計算', href: 'resistance_calc.html',
          icon: 'calculator', color: '#8e44ad', group: 'アドオン', status: 'done',
          desc: '直列/並列計算、SVG回路図。E系列マッチング、目標値逆算、在庫ピッカー。',
        },
        {
          id: 'SCR-012', name: '在庫警告一覧', href: 'stock_alert.html',
          icon: 'alert-triangle', color: '#e84c3d', group: '在庫管理', status: 'done',
          desc: '逼迫度ソート。新品/中古別警告バッジ（warning/eol二段階）。入庫モーダル。発注リスト生成・CSV出力。',
        },
        {
          id: 'SCR-013', name: 'CSVインポート', href: 'csv_import.html',
          icon: 'upload', color: '#27ae60', group: 'データ管理', status: 'done',
          desc: 'ファイル選択→カラムマッピング→バリデーション&プレビュー→完了の4ステップ。重複ポリシー選択・テンプレートDL。',
        },
        {
          id: 'SCR-014', name: 'Altium連携', href: 'altium_link.html',
          icon: 'cpu', color: '#8e44ad', group: 'データ管理', status: 'done',
          desc: 'SchLib/PcbLibパス登録・同期。部品番号マッピング管理（自動マッピング付き）。連携設定。',
        },
      ];

      const groups = computed(() => ['すべて', ...new Set(screens.map(s => s.group))]);
      const activeGroup = ref('すべて');
      const filteredScreens = computed(() =>
        activeGroup.value === 'すべて' ? screens : screens.filter(s => s.group === activeGroup.value)
      );

      const toggleTheme = () => {
        const root = document.documentElement;
        const isLight = root.getAttribute('data-theme') === 'light';
        root.setAttribute('data-theme', isLight ? 'dark' : 'light');
        localStorage.setItem('theme', isLight ? 'dark' : 'light');
        document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
      };

      onMounted(() => {
        const saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('themeToggle').textContent = saved === 'light' ? '🌙' : '☀️';
        lucide.createIcons();
      });

      return { screens, groups, activeGroup, filteredScreens, toggleTheme };
    }
  }).mount('#app');
</script>
</body>
</html>
